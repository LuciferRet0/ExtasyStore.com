<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — ExtasyStore</title>
<link rel="stylesheet" href="store.css">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0A0A0A;--surface:#1A1A1F;--surface-2:#252530;--border:rgba(255,255,255,0.09);--text:#F2F1ED;--text-dim:#9B9DA6;--text-faint:#5E6068;--accent:#FF8C00;--accent-ink:#0A0A0A;--accent-dim:rgba(255,140,0,0.10);--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--body);}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
  header{padding:24px 0;border-bottom:1px solid var(--border);}
  h1{font-family:var(--display);font-size:28px;}
  .btn{font-weight:600;font-size:13px;border:none;border-radius:9px;padding:10px 16px;cursor:pointer;background:var(--accent);color:var(--accent-ink);margin-right:8px;margin-top:8px;}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
  .note{font-size:13px;color:var(--text-dim);margin:16px 0;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);}
</style>
</head>
<body>
<header class="wrap">
  <h1>⚙ ExtasyStore Admin</h1>
  <p style="color:var(--text-dim);margin-top:8px;font-size:14px;">İlanları düzenle — değişiklikler tarayıcıda saklanır (localStorage)</p>
</header>
<main class="wrap admin-grid" id="adminRoot"></main>
<script src="store-config.js"></script>
<script src="products.js"></script>
<script src="lang.js"></script>
<script src="store.js"></script>
<script>
let adminProducts = JSON.parse(JSON.stringify(Store.getProducts()));
let selected = 0;

function saveOverride(){
  localStorage.setItem(Store.KEYS.productsOverride, JSON.stringify(adminProducts));
  Store.toast('Kaydedildi (localStorage)');
}

function renderAdmin(){
  const root = document.getElementById('adminRoot');
  const p = adminProducts[selected];
  root.innerHTML = `
    <div class="admin-list">
      ${adminProducts.map((x,i) => `<button type="button" class="${i===selected?'active':''}" data-i="${i}">${x.name}</button>`).join('')}
      <div style="margin-top:16px;">
        <button type="button" class="btn" id="exportBtn">${t('export')} JSON</button>
        <button type="button" class="btn btn-ghost" id="importBtn">${t('import')} JSON</button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>
    </div>
    <div>
      <p class="note">Gerçek sunucuda products.js dosyasını güncellemek için JSON dışa aktarın. İçe aktarma tarayıcıya kaydeder.</p>
      <form class="admin-form" id="editForm">
        <label>slug</label><input name="slug" value="${p.slug}" />
        <label>name</label><input name="name" value="${p.name.replace(/"/g,'&quot;')}" />
        <label>cat (a/b/c/d)</label><input name="cat" value="${p.cat}" />
        <label>catLabel</label><input name="catLabel" value="${p.catLabel}" />
        <label>desc</label><textarea name="desc">${p.desc}</textarea>
        <label>longDesc</label><textarea name="longDesc">${p.longDesc||''}</textarea>
        <label>price</label><input name="price" type="number" step="0.01" value="${p.price}" />
        <label>was (indirim yoksa boş)</label><input name="was" type="number" step="0.01" value="${p.was||''}" />
        <label>img URL</label><input name="img" value="${p.img||''}" />
        <label>inStock (true/false)</label><input name="inStock" value="${p.inStock !== false}" />
        <label>metaDesc (SEO)</label><textarea name="metaDesc">${p.metaDesc||''}</textarea>
        <label>features (virgülle ayır)</label><input name="features" value="${(p.features||[]).join(', ')}" />
        <button type="submit" class="btn">${t('save')}</button>
        <a href="index.html" class="btn btn-ghost" style="display:inline-block;text-decoration:none;">← Mağaza</a>
      </form>
    </div>`;
  root.querySelectorAll('.admin-list button[data-i]').forEach(btn => {
    btn.onclick = () => { selected = +btn.dataset.i; renderAdmin(); };
  });
  document.getElementById('editForm').onsubmit = e => {
    e.preventDefault();
    const f = e.target;
    adminProducts[selected] = {
      ...adminProducts[selected],
      slug: f.slug.value.trim(),
      name: f.name.value,
      cat: f.cat.value,
      catLabel: f.catLabel.value,
      desc: f.desc.value,
      longDesc: f.longDesc.value,
      price: parseFloat(f.price.value) || 0,
      was: f.was.value ? parseFloat(f.was.value) : null,
      img: f.img.value,
      inStock: f.inStock.value !== 'false',
      metaDesc: f.metaDesc.value,
      features: f.features.value.split(',').map(s => s.trim()).filter(Boolean)
    };
    saveOverride();
  };
  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob([JSON.stringify(adminProducts, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'products-export.json';
    a.click();
  };
  document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        adminProducts = JSON.parse(r.result);
        selected = 0;
        saveOverride();
        renderAdmin();
      } catch { alert('Geçersiz JSON'); }
    };
    r.readAsText(file);
  };
}
document.addEventListener('DOMContentLoaded', () => {
  Store.init({ nav: false });
  renderAdmin();
});
</script>
</body>
</html>
